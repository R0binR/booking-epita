name: security
on:
  workflow_dispatch:

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  # ✅ Reusable workflow appelé au niveau job, pas dans steps
  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.4
    with:
      scan-args: |-
        --format sarif
        --output DependenciesAnalysisFull.sarif
        ./
    permissions:
      actions: read
      contents: read
      security-events: write

  dependencies-analysis:
    runs-on: ubuntu-latest
    needs: osv-scan
    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@v4
        with:
          name: osv-scanner-results  # nom produit par le reusable workflow OSV

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: DependenciesAnalysisFull.sarif

  source-code-analysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config=.semgrep --sarif --output semgrep.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
